<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Prevent zoom on double-tap / pinch in in-app browsers (Instagram, WhatsApp) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Malvec — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Degular+Display:wght@400;500;600;700&family=Degular:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <meta name="theme-color" content="#09010f" />
  <!-- Disable telephone detection on iOS Safari / in-app browsers -->
  <meta name="format-detection" content="telephone=no" />
</head>
<body>

  <!-- ─── HEADER ─────────────────────────────────────────── -->
  <nav id="navbar">
    <div class="nav-logo">MALVEC</div>
    <ul class="nav-links">
      <li><a href="#services">SERVICES</a></li>
      <li><a href="#about">ABOUT</a></li>
      <li><a href="#process">PROCESS</a></li>
    </ul>
    <a href="mailto:hello@malvec.studio" class="nav-cta">Let's Work</a>
  </nav>

  <!-- ─── HERO ─────────────────────────────────────────────── -->
  <main>

    <!-- WebGL fluid background canvas — isolated on own GPU layer -->
    <canvas id="hero-fluid-canvas" aria-hidden="true"></canvas>

    <!-- CSS-only fallback shown when WebGL is unavailable -->
    <div id="hero-css-fallback" class="css-fallback" aria-hidden="true"></div>

    <!-- Background ambient top glow -->
    <div class="ambient-top" aria-hidden="true"></div>

    <!-- Large glowing orb (bottom arc) -->
    <div class="orb-wrap" aria-hidden="true">
      <div class="orb"></div>
    </div>

    <!-- Main content -->
    <div class="content">
      <span class="badge">DIGITAL AGENCY &middot; ARGENTINA</span>
      <h1>Coming <span class="gradient-text">soon.</span></h1>
      <p class="tagline">We're building something great.<br>Check back shortly.</p>

      <!-- LinkedIn button: onclick JS fallback for in-app browsers that block target=_blank -->
      <a
        href="https://www.linkedin.com/company/malvec/"
        target="_blank"
        rel="noopener noreferrer"
        class="linkedin-btn"
        onclick="handleLinkedInClick(event)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        Follow us on LinkedIn
      </a>
    </div>
  </main>

  <script src="header.js"></script>
  <script src="fluid-simulation.js"></script>

  <!-- LinkedIn button: robust cross-browser handler -->
  <script>
    function handleLinkedInClick(e) {
      var url = 'https://www.linkedin.com/company/malvec/';
      // Detect in-app browsers (Instagram, WhatsApp, Facebook, etc.)
      var ua = navigator.userAgent || '';
      var isInApp = /FBAN|FBAV|Instagram|Line\/|WhatsApp|Snapchat|Twitter|MicroMessenger/i.test(ua);

      if (isInApp) {
        // In-app browsers often block window.open and target=_blank
        // Use location.href as the most reliable fallback
        e.preventDefault();
        window.location.href = url;
        return;
      }

      // For normal browsers, try window.open first, fallback to location
      var w = window.open(url, '_blank', 'noopener,noreferrer');
      if (!w || w.closed || typeof w.closed === 'undefined') {
        // Popup was blocked — navigate directly
        e.preventDefault();
        window.location.href = url;
      } else {
        e.preventDefault();
      }
    }
  </script>

</body>
</html>
